version: '3.8'

services:
  codex:
    container_name: codex
    build:
      context: .
      args:
        - GIT_BRANCH=${GIT_BRANCH:-unknown}
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
    ports:
      - "5010:5010"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./exports:/app/exports:rw
      - ./cache:/app/cache:rw
    environment:
      - FLASK_DEBUG=false
    restart: unless-stopped

