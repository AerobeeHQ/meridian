services:
  meridian:
    container_name: meridian
    build:
      context: .
      args:
        - GIT_BRANCH=${GIT_BRANCH:-unknown}
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
    ports:
      - "5010:5010"
    volumes:
      - ./secrets:/app/secrets:ro
      - ./exports:/app/exports:rw
      - ./cache:/app/cache:rw
      - ./notes:/app/notes:rw
    environment:
      - FLASK_DEBUG=false
      - MERIDIAN_SECRETS_DIR=/app/secrets
      - MERIDIAN_CACHE_DIR=/app/cache
      - MERIDIAN_NOTES_DIR=/app/notes
    restart: unless-stopped

