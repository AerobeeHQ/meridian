services:
  codex:
    container_name: codex
    build:
      context: .
      args:
        - GIT_BRANCH=${GIT_BRANCH:-unknown}
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
    ports:
      - "5010:5010"
    volumes:
      - ./secrets:/app/secrets:ro
      - ./exports:/app/exports:rw
      - ./cache:/app/cache:rw
    environment:
      - FLASK_DEBUG=false
      - CODEX_SECRETS_DIR=/app/secrets
    restart: unless-stopped

